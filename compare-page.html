<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden min-h-min">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <link rel="stylesheet" href="./src/input.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="./src/compare.js"></script>
    <title>compare page</title>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden w-screen">
<section class="fixed inset-0 w-screen -z-10">
    <div class="absolute inset-0 bg-gradient-to-br from-black via-purple-900/20 to-black"></div>

    <div class="absolute top-0 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"></div>

    <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>

    <div class="absolute top-1/2 left-1/2 w-96 h-96 bg-pink-500/10 rounded-full blur-3xl"></div>
</section>

<nav
      class="relative w-full flex items-center justify-between px-24 py-6 bg-white/5 backdrop-blur-md border-b border-white/10"
    >
      <div class="flex items-center gap-12">
        <a
        href="./index.html"
          class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent"
        >
          GameHub
      </a>
        <div class="hidden md:flex gap-6 text-slate-500 font-medium mt-2">
          <a
            href="./ontdek.html"
            class="focus:border-b-2 focus:border-cyan-400 focus:text-cyan-400 hover:text-white"
            >Ontdek</a
          >
          <a
            href="./collection-page.html"
            class="focus:border-b-2 focus:border-cyan-400 focus:text-cyan-400 hover:text-white"
            >Collectie</a
          >
          <a
            href="./compare-page.html"
            class="focus:border-b-2 focus:border-cyan-400 focus:text-cyan-400 hover:text-white"
            >Vergelijk</a
          >
        </div>
      </div>

      <div class="flex items-center gap-4 mt-2">
        <button
          class="flex items-center gap-2 bg-[#111827] border border-gray-700 px-4 py-2 rounded-xl hover:bg-gray-800 transition"
        >
          <span class="text-cyan-400 text-sm">✦</span>
          <a href="/raad-page.html" class="text-sm font-semibold"
            >Raad de game</a
          >
        </button>
        <a href="/login.html" class="text-gray-400 hover:text-white">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
        </a>
      </div>
    </nav>
  
    <header class="text-center mt-12 md:mt-20 mb-12 px-4">
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight">
            Compare <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Games</span>
        </h1>
        <p class="text-lg text-slate-500 mt-6">Selecteer twee games om te vergelijken</p>
    </header>

    <main class="relative z-10 max-w-7xl mx-auto px-4 md:px-6 pb-20">
        
        <section class="flex flex-col lg:flex-row items-center justify-center gap-24 mb-16">

            <article class="relative group w-full lg:flex-1 max-w-lg">
                <div class="relative">
                    <div class="absolute inset-0 bg-cyan-500/40 rounded-[2rem] blur-lg group-hover:bg-cyan-500/60 transition duration-500"></div>
                    <div class="relative bg-black/60 backdrop-blur-xl border border-white/10 rounded-[2rem] overflow-hidden">
                        <figure class="relative">
                            <img id="game-img-1" src="" alt="Game 1" class="w-full h-64 md:h-72 object-cover opacity-70 group-hover:opacity-100 transition duration-500">
                            <figcaption class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black/90 to-transparent">
                                <h2 id="game-name-1" class="text-2xl md:text-3xl font-bold mb-1">Laden...</h2>
                                <p id="game-meta-1" class="text-cyan-400 font-bold text-sm md:text-base">-</p>
                            </figcaption>
                        </figure>  
                    </div>
                </div>
                <div class="mt-4">
                    <button id="button-change-1" class="w-full py-4 text-lg text-cyan-500 bg-white/5 hover:bg-cyan-500/20 border border-white/10 rounded-2xl font-bold transition-all">
                        Verander Game
                    </button>
                </div>
            </article>

            <article class="relative group w-full lg:flex-1 max-w-lg">
                <div class="relative">
                    <div class="absolute inset-0 bg-purple-500/40 rounded-[2rem] blur-lg group-hover:bg-purple-500/60 transition duration-500"></div>
                    <div class="relative bg-black/60 backdrop-blur-xl border border-white/10 rounded-[2rem] overflow-hidden">
                        <figure class="relative">
                            <img id="game-img-2" src="" alt="Game 2" class="w-full h-64 md:h-72 object-cover opacity-70 group-hover:opacity-100 transition duration-500">
                            <figcaption class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black/90 to-transparent">
                                <h2 id="game-name-2" class="text-2xl md:text-3xl font-bold mb-1">Laden...</h2>
                                <p id="game-meta-2" class="text-purple-400 font-bold text-sm md:text-base">-</p>
                            </figcaption>
                        </figure>
                    </div>
                </div>
                <div class="mt-4">
                    <button id="button-change-2" class="w-full py-4 text-lg text-purple-500 bg-white/5 hover:bg-purple-500/20 border border-white/10 rounded-2xl font-bold transition-all">
                        Verander Game
                    </button>
                </div>
            </article>

        </section>

        <section class="max-w-4xl mx-auto bg-black/40 backdrop-blur-2xl border border-white/20 rounded-[2.5rem] p-6 md:p-10 shadow-2xl">
            <h3 class="text-3xl md:text-4xl pb-6 font-extrabold bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 text-transparent text-center">
                Statistieken
            </h3>

            <ul class="flex flex-col divide-y divide-white/10">
                
                <li class="flex items-center justify-between py-6 md:py-8">
                    <span id="rating-1" class="text-lg md:text-xl font-mono text-gray-400">0.0</span>
                    <div class="flex items-center gap-2 md:gap-3 px-2 text-center">
                        <span class="arrow-left text-gray-500">—</span>
                        <span class="text-gray-400 uppercase tracking-tighter font-bold text-[10px] md:text-sm">gebruikers beoordeling</span>
                        <span class="arrow-right text-gray-500">—</span>
                    </div>
                    <span id="rating-2" class="text-lg md:text-xl font-mono text-gray-400">0.0</span>
                </li>

                <li class="flex items-center justify-between py-6 md:py-8">
                    <span id="releasedate-1" class="text-sm md:text-xl font-mono text-gray-400">0000-00-00</span>
                    <div class="flex items-center gap-2 md:gap-3 px-2 text-center text-gray-400 uppercase tracking-tighter font-bold text-[10px] md:text-sm">
                        <span>uitgebracht</span>
                    </div>
                    <span id="releasedate-2" class="text-sm md:text-xl font-mono text-gray-400">0000-00-00</span>
                </li>

                <li class="flex items-center justify-between py-6 md:py-8">
                    <span id="platform-1" class="text-lg md:text-xl font-mono text-gray-400">0</span>
                    <div class="flex items-center gap-2 md:gap-3 px-2 text-center">
                        <span class="arrow-left text-gray-500">—</span>
                        <span class="text-gray-400 uppercase tracking-tighter font-bold text-[10px] md:text-sm">platformen</span>
                        <span class="arrow-right text-gray-500">—</span>
                    </div>
                    <span id="platform-2" class="text-lg md:text-xl font-mono text-gray-400">0</span>
                </li>
                
            </ul>
        </section>
    </main>
</body>
</html>
