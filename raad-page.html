<!doctype html>
<html lang="en" class="overflow-x-hidden min-h-screen">
  <head>
    <meta charset="UTF-8" />
    <script src="./src/raad.js" defer></script>
    <script src="./src/nav.js" defer></script>
    <script src="./src/active.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>GameHub</title>
  </head>
  <body
    class="bg-black text-white min-h-screen flex flex-col relative overflow-x-hidden w-full"
  >
    <section class="absolute inset-0 w-screen max-h-300 -z-10">
      <div
        class="absolute inset-0 bg-gradient-to-br from-black via-purple-900/20 to-black"
      ></div>

      <div
        class="absolute top-0 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl"
      ></div>

      <div
        class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"
      ></div>

      <div
        class="absolute top-1/2 left-1/2 w-96 h-96 bg-pink-500/10 rounded-full blur-3xl"
      ></div>
    </section>
    <nav
      class="relative w-full flex items-center justify-between px-6 md:px-24 py-6 bg-white/5 backdrop-blur-md border-b border-white/10"
    >
      <a
        href="./index.html"
        class="text-3xl md:text-4xl font-extrabold tracking-tight bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent"
      >
        GameHub
      </a>

      <section
        class="hidden md:flex gap-8 text-slate-400 font-medium absolute left-1/2 -translate-x-1/2 translate-y-[6px]"
      >
        <a href="./ontdek.html" class="hover:text-white">Ontdek</a>
        <a href="./collection-page.html" class="hover:text-white">Collectie</a>
        <a href="./compare-page.html" class="hover:text-white">Vergelijk</a>
      </section>

      <section class="flex items-center pt-2 gap-3">
        <a
          href="./raad-page.html"
          class="flex items-center gap-2 bg-[#111827] border border-gray-700 px-4 py-2 rounded-xl hover:bg-gray-800 transition text-sm font-semibold"
        >
          <span class="text-cyan-400 text-sm">✦</span>
          <span>Raad de game</span>
        </a>

        <a
          href="./login.html"
          class="hidden md:block text-gray-400 hover:text-white"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
        </a>

        <button id="menuBtn" class="md:hidden text-white p-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        </button>
      </section>
    </nav>
    <section class="w-full px-6 md:px-24 mt-6 relative z-10">
      <section id="currentGameBannerHost"></section>
    </section>
    <section id="mobileMenu" class="fixed inset-0 z-50 hidden bg-[#050816]">
      <section
        class="relative w-full flex items-center justify-between pl-6 pr-4 py-6 bg-gradient-to-r from-black via-[#0b1120] to-[#1b1230] border-b border-white/10"
      >
        <a
          href="./index.html"
          class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent"
        >
          GameHub
        </a>

        <section class="flex items-center pt-2 gap-3">
          <a
            href="./raad-page.html"
            class="flex items-center gap-2 bg-[#111827] border border-gray-700 px-4 py-2 rounded-xl hover:bg-gray-800 transition text-sm font-semibold"
          >
            <span class="text-cyan-400 text-sm">✦</span>
            <span>Raad de game</span>
          </a>

          <button id="closeMenuBtn" class="text-white p-2 pr-0 shrink-0">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-8 w-8"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </section>
      </section>

      <section
        class="h-[calc(100vh-89px)] flex flex-col items-center justify-center gap-15 text-slate-500 font-black text-5xl tracking-tight -mt-20"
      >
        <a href="./ontdek.html" class="hover:text-white transition">Ontdek</a>
        <a href="./collection-page.html" class="hover:text-white transition"
          >Collectie</a
        >
        <a href="./compare-page.html" class="hover:text-white transition"
          >Vergelijk</a
        >
      </section>

      <a
        href="./login.html"
        class="absolute bottom-8 right-6 flex items-center gap-2 text-red-500 hover:text-red-400 text-base font-semibold"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          />
        </svg>
        Logout
      </a>
    </section>
    <main class="px-12 pb-2 flex flex-col items-center mt-8 shrink-0">
      <section class="w-full max-w-2xl flex flex-col items-center">
        <section class="text-center mb-4">
          <h1 class="text-5xl text-white font-black mb-2.5">
            Raad de <span class="gradient-text animate-gradient">Game</span>
          </h1>
          <p class="text-slate-400 text-lg">
            Identificeer het wazig afgebeeld spel
          </p>
        </section>

        <section
          class="m-8 w-full relative aspect-video rounded-3xl overflow-hidden border-2 border-cyan-500/30 glass-strong neon-cyan"
        >
          <img
            id="blurImage"
            src="https://images.unsplash.com/photo-1706804653497-1b43f7cc68ef?w=800"
            alt="Mystery Game"
            class="w-full h-full object-cover transition-all duration-1000"
            style="filter: blur(40px)"
          />
          <p
            class="text-slate-300 font-semibold absolute top-6 right-6 px-5 py-3 glass-strong rounded-xl border-2 border-white/20"
          >
            Blur Level:
            <span id="blurLevel" class="font-black text-cyan-400">40%</span>
          </p>
          <p
            class="font-black text-cyan-400 absolute top-6 left-6 px-5 py-3 glass-strong rounded-xl border-2 border-white/20"
          >
            Level
            <span class="font-black text-cyan-400 mr-1" id="currentLevel"
              >1 </span
            >: <span id="currentProgress">0</span> / 10
          </p>
        </section>

        <section class="relative max-w-5xl mx-auto w-full">
          <input
            id="gameSearch"
            type="text"
            placeholder="Raad spel..."
            class="mb-8 w-full rounded-3xl border border-white/10 bg-white/5 px-10 py-7 text-2xl text-white placeholder-slate-500 outline-none backdrop-blur-md"
          />
          <section
            id="suggestions"
            class="hidden absolute bg-white/5 left-0 right-0 top-22 mt-2 rounded-2xl glass-strong overflow-hidden z-50 backdrop-blur-md"
          ></section>
        </section>

        <section class="flex gap-12 mb-8">
          <button
            id="skipGame"
            class="hover:bg-white/5 inline-flex items-center gap-2 justify-center rounded-xl font-semibold transition-all duration-500 disabled:opacity-50 disabled:cursor-not-allowed relative overflow-hidden group glass text-cyan-300 border-cyan-500/30 hover:ring-cyan-400/50 hover:scale-105 neon-cyan px-6 py-3 text-base"
          >
            <svg
              fill="currentColor"
              viewBox="-1.5 -2.5 24 24"
              xmlns="http://www.w3.org/2000/svg"
              preserveAspectRatio="xMinYMin"
              class="jam jam-refresh-reverse w-5 h-5"
              transform="rotate(180)matrix(-1, 0, 0, 1, 0, 0)"
            >
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g
                id="SVGRepo_tracerCarrier"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></g>
              <g id="SVGRepo_iconCarrier">
                <path
                  d="M4.859 5.308l1.594-.488a1 1 0 0 1 .585 1.913l-3.825 1.17a1 1 0 0 1-1.249-.665L.794 3.413a1 1 0 1 1 1.913-.585l.44 1.441C5.555.56 10.332-1.035 14.573.703a9.381 9.381 0 0 1 5.38 5.831 1 1 0 1 1-1.905.608A7.381 7.381 0 0 0 4.86 5.308zm12.327 8.195l-1.775.443a1 1 0 1 1-.484-1.94l3.643-.909a.997.997 0 0 1 .61-.08 1 1 0 0 1 .84.75l.968 3.88a1 1 0 0 1-1.94.484l-.33-1.322a9.381 9.381 0 0 1-16.384-1.796l-.26-.634a1 1 0 1 1 1.851-.758l.26.633a7.381 7.381 0 0 0 13.001 1.25z"
                ></path>
              </g>
            </svg>
          </button>
          <button
            id="guessSubmit"
            class="hover:bg-white/5 glass-strong items-center gap-2 justify-center rounded-xl font-semibold transition-all duration-500 disabled:opacity-50 disabled:cursor-not-allowed relative overflow-hidden group glass text-cyan-300 border-cyan-500/30 hover:ring-cyan-400/50 hover:scale-105 neon-cyan px-6 py-3 text-base"
          >
            <span>Doe een Gok</span>
          </button>
        </section>

        <p class="text-slate-500 mb-2">
          Verkeerde antwoorden maken de afbeelding minder wazig
        </p>

        <a
          href="./ontdek.html"
          class="flex items-center justify-center rounded-xl font-semibold transition-all duration-500 disabled:opacity-50 disabled:cursor-not-allowed relative overflow-hidden text-slate-400 hover:text-cyan-300 hover:bg-white/5 px-6 py-3 text-base"
          >Terug naar ontdekken</a
        >
      </section>
    </main>
  </body>
</html>
